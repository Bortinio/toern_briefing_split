<title>Modellvergleich 2026-05-22</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;color:#333;-webkit-font-smoothing:antialiased}
.pg{max-width:640px;margin:0 auto;padding:8px}

/* ── Header — 1:1 wie Briefing Builder ── */
.hdr-table{width:100%;max-width:640px;margin:0 auto;border-collapse:collapse}
.hdr-cell{background:linear-gradient(135deg,#1B3A5C,#2E75B6);padding:24px 28px;color:#fff;border-radius:10px 10px 0 0}
.hdr-inner{width:100%;border-collapse:collapse}
.hdr-inner h1{margin:0;font-size:24px;font-weight:700;letter-spacing:-0.5px}
.hdr-inner .subtitle{margin:4px 0 0;font-size:14px;opacity:0.85}
.hdr-inner .date{margin:0;font-size:13px;opacity:0.7}
.hdr-inner .time{margin:2px 0 0;font-size:11px;opacity:0.5}
.back-bar{background:#fff;border-left:1px solid #e8ecf0;border-right:1px solid #e8ecf0;padding:8px 28px}
.back-link{font-size:12px;color:#2E75B6;text-decoration:none}
.back-link:hover{color:#1B3A5C;text-decoration:underline}

/* ── Tabs ── */
.tabs{display:flex;background:#fff;border-left:1px solid #e8ecf0;border-right:1px solid #e8ecf0}
.tab{flex:1;text-align:center;padding:10px 4px;font-size:12px;cursor:pointer;border-bottom:2px solid transparent;color:#888;transition:all .15s;background:none;font-family:inherit}
.tab.active{color:#1B3A5C;border-bottom-color:#1B3A5C;font-weight:600}
.tab:hover:not(.active){background:#f8fafc}

/* ── Body ── */
.bd{background:#fff;border:1px solid #e8ecf0;border-top:none;border-radius:0 0 10px 10px;padding:14px 16px}

/* ── Legende ── */
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;padding:7px 12px;background:#f8fafc;border-radius:6px;font-size:10px;color:#888}
.li{display:flex;align-items:center;gap:4px}
.ld{width:8px;height:8px;border-radius:50%}

/* ── Toggles ── */
.tgl-row{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap}
.tgl{font-size:10px;padding:4px 10px;border-radius:6px;cursor:pointer;border:1px solid #ddd;background:#fff;color:#888;transition:all .15s;font-family:inherit}
.tgl.on{background:#E6F1FB;color:#0C447C;border-color:#85B7EB}

/* ── Block-Karten ── */
.bc{margin-bottom:12px;border:1px solid #e8ecf0;border-radius:10px;overflow:hidden}
.bh{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:#f8fafc;border-bottom:1px solid #e8ecf0}
.bh h3{font-size:13px;font-weight:600;color:#1B3A5C}
.bh .sum{font-size:10px;color:#888}
.bb{padding:10px 14px}

/* ── Parameter-Zeilen ── */
.pr{margin-bottom:10px}.pr:last-child{margin-bottom:0}
.pl{font-size:10px;font-weight:600;color:#999;margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}

/* ── Modell-Zeile: Name | Wert | Sparkline | Richtung ── */
.mr{display:grid;grid-template-columns:72px 46px minmax(0,1fr) 40px;align-items:center;gap:5px;padding:3px 0}
.mn{font-size:10px;font-weight:600}
.mn-sg{color:#BA7517}
.mn-om{color:#185FA5}
.mn-gfs{color:#3B6D11}
.mn-mar{color:#0F6E56}
.mv{font-size:11px;font-weight:600;text-align:right;font-family:'SF Mono',SFMono-Regular,Menlo,monospace}
.sw{height:auto;position:relative;min-height:20px}
.sw svg{display:block}
.md{font-size:10px;color:#888;text-align:center}

/* ── Spread-Balken ── */
.sb{margin-top:5px;display:flex;align-items:center;gap:8px}
.sl{font-size:9px;color:#72243E;font-weight:600;white-space:nowrap}
.st{flex:1;height:5px;background:#FBEAF0;border-radius:3px;overflow:hidden}
.sf{height:100%;background:#D4537E;border-radius:3px;transition:width .3s}
.sv{font-size:9px;color:#72243E;font-weight:600;font-family:monospace;min-width:28px}

/* ── Trennlinie ── */
.sep{border:none;border-top:1px solid #e8ecf0;margin:8px 0}

/* ── Performance-Grid (5 Spalten) ── */
.pg5{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:6px}
.pb{background:#f8fafc;border-radius:6px;padding:7px 4px;text-align:center}
.pb .la{font-size:9px;color:#888;margin-bottom:1px;line-height:1.2}
.pb .va{font-size:13px;font-weight:600;color:#1B3A5C;font-family:monospace}
.pb .un{font-size:9px;color:#888}
.pb .tw{font-size:8px;color:#aaa;margin-top:1px}

/* ── Footer ── */
.ft{padding:14px 0;text-align:center;font-size:10px;color:#bbb}

/* ── Responsive ── */
@media(max-width:480px){
  .pg5{grid-template-columns:repeat(3,1fr)}
  .hdr-cell{padding:16px 18px}
  .hdr-inner h1{font-size:20px}
  .mr{grid-template-columns:62px 40px minmax(0,1fr) 34px;gap:3px}
  .scores .sc .big{font-size:20px}
}
</style>

var ARROWS=['\u2193','\u2199','\u2190','\u2196','\u2191','\u2197','\u2192','\u2198'];
function wA(d){return d!=null?ARROWS[Math.round(d/45)%8]:''}

function safeAvg(arr){
  var f=arr.filter(function(v){return v!=null&&v>0});
  return f.length?Math.round(f.reduce(function(a,b){return a+b},0)/f.length*10)/10:0;
}
function safeMax(arr){
  var f=arr.filter(function(v){return v!=null&&v>0});
  return f.length?Math.round(Math.max.apply(null,f)*10)/10:0;
}

// ── Sparkline: SVG (stretched) + HTML-Ticks (nicht gestreckt) ──
function sparkSVG(vals,color,maxVal,h0){
  if(!vals.length)return'';
  var w=200, lineH=20, pad=2;
  maxVal=maxVal||Math.max.apply(null,vals.concat(1));
  var pts=vals.map(function(v,i){
    var x=pad+(i/(vals.length-1||1))*(w-2*pad);
    var y=lineH-pad-(v/maxVal)*(lineH-2*pad);
    return Math.round(x*10)/10+','+Math.round(y*10)/10;
  }).join(' ');

  // SVG nur für die Linie (wird gestreckt via preserveAspectRatio=none)
  var svg='<svg viewBox="0 0 '+w+' '+lineH+'" preserveAspectRatio="none" style="width:100%;height:20px;display:block">';
  svg+='<polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>';
  svg+='</svg>';

  // HTML-Ticks darunter (nicht gestreckt, normaler DOM-Flow)
  if(h0!=null){
    svg+='<div style="display:flex;justify-content:space-between;padding:0 1px;margin-top:1px">';
    for(var i=0;i<vals.length;i++){
      svg+='<span style="font-size:7px;color:#aaa;font-family:monospace;line-height:1;text-align:center;min-width:0">'+(h0+i)+'</span>';
    }
    svg+='</div>';
  }
  return svg;
}

// ── Stündliche Werte für einen Block + Quellen + Feld holen ──
function getHourly(dayIdx,h0,h1,sources,field){
  var rows=D.hourlyFlat[dayIdx]||[];
  var result={};
  sources.forEach(function(s){result[s]=[];});
  for(var h=h0;h<=h1;h++){
    sources.forEach(function(s){
      var found=rows.filter(function(r){return r.hour===h&&r.source===s});
      var val=found.length?found[0][field]:null;
      result[s].push(val!=null?val:0);
    });
  }
  return result;
}

// ══════════════════════════════════════════════════════════════
// Tabs erzeugen
// ══════════════════════════════════════════════════════════════
var tabsEl=document.getElementById('dt');
D.dayNames.forEach(function(dn,i){
  var t=document.createElement('div');
  t.className='tab'+(i===0?' active':'');
  t.textContent=dn.label+' ('+dn.short+')';
  t.onclick=function(){switchDay(i)};
  tabsEl.appendChild(t);
});

// ══════════════════════════════════════════════════════════════
// Toggles erzeugen
// ══════════════════════════════════════════════════════════════
var tglEl=document.getElementById('toggles');
[
  {k:'wind',l:'Wind',on:1},
  {k:'gust',l:'B\u00f6en',on:1},
  {k:'wave',l:'Wellen',on:1},
  {k:'pressure',l:'Druck',on:0},
  {k:'current',l:'Str\u00f6mung/Wassertemp',on:0},
  {k:'airtemp',  l:'Lufttemp.',   on:0}
].forEach(function(p){
  var b=document.createElement('div');
  b.className='tgl'+(p.on?' on':'');
  b.textContent=p.l;
  b.onclick=function(){
    vp[p.k]=vp[p.k]?0:1;
    b.classList.toggle('on');
    renderDay(cD);
  };
  tglEl.appendChild(b);
});

// ══════════════════════════════════════════════════════════════
// Tag rendern
// ══════════════════════════════════════════════════════════════
function renderDay(dayIdx){
  cD=dayIdx;
  var html='';

  BLOCKS.forEach(function(bl){
    // ── Block-Zusammenfassung ──
    var windData=getHourly(dayIdx,bl.h0,bl.h1,WIND_SOURCES,'wind');
    var allWindVals=WIND_SOURCES.flatMap(function(s){return windData[s]});
    var blockWindAvg=safeAvg(allWindVals);

    var gustData=getHourly(dayIdx,bl.h0,bl.h1,WIND_SOURCES,'gust');
    var allGustVals=WIND_SOURCES.flatMap(function(s){return gustData[s]});
    var blockGustMax=safeMax(allGustVals);

    var waveData=getHourly(dayIdx,bl.h0,bl.h1,WAVE_SOURCES,'wave');
    var allWaveVals=WAVE_SOURCES.flatMap(function(s){return waveData[s]});
    var blockWaveAvg=safeAvg(allWaveVals);

    var dirData=getHourly(dayIdx,bl.h0,bl.h1,WIND_SOURCES,'dir');
    var allDirVals=WIND_SOURCES.flatMap(function(s){return dirData[s]});
    var blockDirAvg=safeAvg(allDirVals)!=null?Math.round(safeAvg(allDirVals)):null;

    html+='<div class="bc">';
    html+='<div class="bh"><h3>'+bl.name+' \u00b7 '+bl.range+'</h3>';
    html+='<span class="sum">'+wA(blockDirAvg)+' '+blockWindAvg+' kt \u00b7 B\u00f6en '+blockGustMax+' \u00b7 '+blockWaveAvg+'m</span></div>';
    html+='<div class="bb">';

    // ════════════════════════════
    // WIND
    // ════════════════════════════
    if(vp.wind){
      var allMax=Math.max.apply(null,allWindVals.concat(1));
      html+='<div class="pr"><div class="pl">Wind (kt)</div><div>';
      WIND_SOURCES.forEach(function(src){
        var vals=windData[src];
        var dirs=dirData[src];
        var a=safeAvg(vals);
        var dA=safeAvg(dirs)!=null?Math.round(safeAvg(dirs)):null;
        html+='<div class="mr">';
        html+='<span class="mn '+CSS_CLS[src]+'">'+NAMES[src]+'</span>';
        html+='<span class="mv">'+a+'</span>';
        html+='<div class="sw">'+sparkSVG(vals,COLORS[src],allMax,bl.h0)+'</div>';
        html+='<span class="md">'+wA(dA)+(dA?' '+dA+'\u00b0':'')+'</span>';
        html+='</div>';
      });
      html+='</div>';

      // Spread
      var spreads=[];
      for(var hh=bl.h0;hh<=bl.h1;hh++){
        var hVals=WIND_SOURCES.map(function(s){return windData[s][hh-bl.h0]}).filter(function(v){return v>0});
        if(hVals.length>=2) spreads.push(Math.max.apply(null,hVals)-Math.min.apply(null,hVals));
      }
      var spAvg=spreads.length?Math.round(spreads.reduce(function(a,b){return a+b},0)/spreads.length*10)/10:0;
      var spPct=allMax>0?Math.min(100,Math.round(spAvg/allMax*300)):0;
      html+='<div class="sb"><span class="sl">Spread</span><div class="st"><div class="sf" style="width:'+spPct+'%"></div></div><span class="sv">'+spAvg+' kt</span></div>';
      html+='</div>';
    }

    // ════════════════════════════
    // BÖEN
    // ════════════════════════════
    if(vp.gust){
      var gustData2=getHourly(dayIdx,bl.h0,bl.h1,GUST_SOURCES,'gust');
      var gAll=GUST_SOURCES.flatMap(function(s){return gustData2[s]});
      var gMax=Math.max.apply(null,gAll.concat(1));
      html+='<div class="pr"><div class="pl">B\u00f6en (kt)</div><div>';
      GUST_SOURCES.forEach(function(src){
        var vals=gustData2[src];
        var mxVal=safeMax(vals);
        html+='<div class="mr">';
        html+='<span class="mn '+CSS_CLS[src]+'">'+NAMES[src]+'</span>';
        html+='<span class="mv"'+(mxVal>20?' style="color:#A32D2D"':'')+'>'+mxVal+'</span>';
        html+='<div class="sw">'+sparkSVG(vals,COLORS[src],gMax,bl.h0)+'</div>';
        html+='<span class="md">max</span>';
        html+='</div>';
      });
      html+='</div></div>';
    }

    // ════════════════════════════
    // WELLEN & PERIODE
    // ════════════════════════════
    if(vp.wave){
      html+='<div class="pr"><div class="pl">Wellen &amp; Periode</div><div>';
      WAVE_SOURCES.forEach(function(src){
        var wVals=getHourly(dayIdx,bl.h0,bl.h1,[src],'wave')[src];
        var pVals=getHourly(dayIdx,bl.h0,bl.h1,[src],'wavePeriod')[src];
        var wAvg=safeAvg(wVals);
        var pAvg=safeAvg(pVals);
        if(wAvg>0){
          html+='<div class="mr"><span class="mn '+CSS_CLS[src]+'">'+NAMES[src]+' H</span>';
          html+='<span class="mv">'+wAvg+'m</span>';
          html+='<div class="sw">'+sparkSVG(wVals,COLORS[src],Math.max.apply(null,wVals.concat(.5)),bl.h0)+'</div>';
          html+='<span class="md">\u2205</span></div>';
        }
        if(pAvg>0){
          html+='<div class="mr"><span class="mn '+CSS_CLS[src]+'">'+NAMES[src]+' T</span>';
          html+='<span class="mv">'+pAvg+'s</span>';
          html+='<div class="sw">'+sparkSVG(pVals,COLORS[src],Math.max.apply(null,pVals.concat(5)),bl.h0)+'</div>';
          html+='<span class="md">\u2205</span></div>';
        }
      });
      html+='</div></div>';
    }

    // ════════════════════════════
    // DRUCK
    // ════════════════════════════
    if(vp.pressure){
      var pData=getHourly(dayIdx,bl.h0,bl.h1,WIND_SOURCES,'pressure');
      var allP=WIND_SOURCES.flatMap(function(s){return pData[s]}).filter(function(v){return v>0});
      if(allP.length){
        var pMin=Math.min.apply(null,allP)-1;
        var pMax=Math.max.apply(null,allP)+1;
        html+='<div class="pr"><div class="pl">Druck (hPa)</div><div>';
        WIND_SOURCES.forEach(function(src){
          var vals=pData[src];
          var a=safeAvg(vals);
          if(a>0){
            var normalized=vals.map(function(v){return v>0?(v-pMin)/(pMax-pMin)*18:0});
            html+='<div class="mr"><span class="mn '+CSS_CLS[src]+'">'+NAMES[src]+'</span>';
            html+='<span class="mv">'+a+'</span>';
            html+='<div class="sw">'+sparkSVG(normalized,COLORS[src],18,bl.h0)+'</div>';
            html+='<span class="md">\u2205</span></div>';
          }
        });
        html+='</div></div>';
      }
    }

    // ════════════════════════════
    // STRÖMUNG & WASSERTEMP
    // ════════════════════════════
    if(vp.current){
      var cData=getHourly(dayIdx,bl.h0,bl.h1,['stormglass'],'current');
      var tData=getHourly(dayIdx,bl.h0,bl.h1,['stormglass'],'waterTemp');
      var cVals=cData.stormglass||[];
      var tVals=tData.stormglass||[];
      var cAvg=safeAvg(cVals);
      var tAvg=safeAvg(tVals);
      if(cAvg>0||tAvg>0){
        html+='<div class="pr"><div class="pl">Str\u00f6mung &amp; Wassertemp.</div><div>';
        if(cAvg>0){
          html+='<div class="mr"><span class="mn mn-sg">Str\u00f6mung</span><span class="mv">'+cAvg+' kt</span>';
          html+='<div class="sw">'+sparkSVG(cVals,COLORS.stormglass,Math.max.apply(null,cVals.concat(.5)),bl.h0)+'</div>';
          html+='<span class="md">\u2205</span></div>';
        }
        if(tAvg>0){
          html+='<div class="mr"><span class="mn mn-sg">Wasser</span><span class="mv">'+tAvg+'\u00b0C</span>';
          html+='<div class="sw">'+sparkSVG(tVals,COLORS.stormglass,Math.max.apply(null,tVals.concat(20)),bl.h0)+'</div>';
          html+='<span class="md">\u2205</span></div>';
        }
        html+='</div></div>';
      }
    }

    // ════════════════════════════
    // LUFTTEMPERATUR
    // ════════════════════════════
    if(vp.airtemp){
      var atData=getHourly(dayIdx,bl.h0,bl.h1,['open-meteo-wind'],'airTemp');
      var atVals=atData['open-meteo-wind']||[];
      var atAvg=safeAvg(atVals);
      if(atAvg>0){
        html+='<div class="pr"><div class="pl">Lufttemp. (°C)</div><div>';
        html+='<div class="mr"><span class="mn mn-om">Open-Meteo</span>';
        html+='<span class="mv">'+atAvg+'°</span>';
        html+='<div class="sw">'+sparkSVG(atVals,COLORS['open-meteo-wind'],Math.max.apply(null,atVals.concat(30)),bl.h0)+'</div>';
        html+='<span class="md">∅</span></div>';
        html+='</div></div>';
      }
    }

    // ════════════════════════════
    // Dufour 44 PERFORMANCE
    // ════════════════════════════
    var perf=D.blockPerf.filter(function(p){
      return p.day_offset===dayIdx && p.time_block===bl.tb;
    })[0];

    if(perf){
      html+='<hr class="sep">';
      html+='<div class="pl">Dufour 44 performance</div>';
      html+='<div class="pg5">';
      html+='<div class="pb"><div class="la">BSP beam</div><div class="va">'+(perf.bsp_beam!=null?perf.bsp_beam:'\u2014')+'<span class="un"> kt</span></div><div class="tw">TWA 90\u00b0</div></div>';
      html+='<div class="pb"><div class="la">BSP reach</div><div class="va">'+(perf.bsp_reach!=null?perf.bsp_reach:'\u2014')+'<span class="un"> kt</span></div><div class="tw">TWA '+(perf.bsp_reach_twa||120)+'\u00b0</div></div>';
      html+='<div class="pb"><div class="la">VMG up</div><div class="va">'+(perf.vmg_up!=null?perf.vmg_up:'\u2014')+'<span class="un"> kt</span></div><div class="tw">TWA '+(perf.vmg_up_twa||42)+'\u00b0</div></div>';
      html+='<div class="pb"><div class="la">VMG down</div><div class="va">'+(perf.vmg_down!=null?perf.vmg_down:'\u2014')+'<span class="un"> kt</span></div><div class="tw">TWA '+(perf.vmg_down_twa||140)+'\u00b0</div></div>';
      var wRed=perf.wave_reduction!=null?perf.wave_reduction:0;
      html+='<div class="pb"><div class="la">Wellen \u2212</div><div class="va">\u2212'+wRed+'<span class="un">%</span></div><div class="tw">'+(perf.wave_avg!=null?perf.wave_avg:0)+'m</div></div>';
      html+='</div>';
    }

    html+='</div></div>'; // close .bb + .bc
  });

  document.getElementById('blocks').innerHTML=html;
}

// ══════════════════════════════════════════════════════════════
// Tag wechseln
// ══════════════════════════════════════════════════════════════
function switchDay(idx){
  cD=idx;
  document.querySelectorAll('.tab').forEach(function(t,j){
    t.classList.toggle('active',j===idx);
  });
  renderDay(idx);
}

// Initial rendern
renderDay(0);
</script>
